<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi amor(Ale preciosa hermosa)</title>
    <style>
        /* Configuramos el cuerpo para que no tenga bordes y el fondo sea negro */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Evita el scroll innecesario */
            background-color: #000; /* Color de fondo si la imagen no cubre todo */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Contenedor de la imagen de fondo */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('img.png');
            /* "contain" hace que la imagen se vea COMPLETA sin recortes */
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center;
            z-index: 1;
        }

        /* Botón opcional por si el autoplay falla */
        #play-btn {
            position: relative;
            z-index: 10;
            padding: 15px 25px;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }

        #play-btn:hover {
            background: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="background-container"></div>

    <button id="play-btn">Toca para empezar</button>

    <audio id="miMusica" loop>
        <source src="music.mp3" type="audio/mpeg">
        Tu navegador no soporta audio.
    </audio>

    <script>
        const btn = document.getElementById('play-btn');
        const audio = document.getElementById('miMusica');

        btn.addEventListener('click', function() {
            audio.play();
            // Desvanecer el botón después de hacer clic
            btn.style.opacity = '0';
            setTimeout(() => {
                btn.style.display = 'none';
            }, 300);
        });
    </script>

</body>
</html>
